services:
  postgres:
    image: postgres:16-alpine
    container_name: advay-postgres
    environment:
      POSTGRES_DB: advay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - advay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d advay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  advay-postgres-data:
